<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login SIAKAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md p-10 rounded-3xl shadow-2xl text-center">
        <h2 class="text-3xl font-bold text-gray-800 mb-2">Portal Login</h2>
        <p class="text-gray-500 mb-8">Silakan masukkan akun akademik Anda</p>
        
        <form>
            <input type="text" placeholder="NISN / Username" class="w-full mb-4 p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-800">
            <input type="password" placeholder="Password" class="w-full mb-6 p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-800">
            
            <a href="dashboard.html" class="block w-full bg-blue-800 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg">
                MASUK SEKARANG
            </a>
        </form>
        
        <p class="mt-6 text-sm text-gray-400">Kembali ke <a href="index.html" class="text-blue-800 underline">Beranda Utama</a></p>
    </div>
</body>
</html>
