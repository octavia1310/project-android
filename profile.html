<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - SIAKAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-blue-900 text-white flex-shrink-0 hidden md:flex flex-col">
            <div class="p-6 border-b border-blue-800 flex items-center space-x-3">
                <i class="fas fa-graduation-cap text-2xl"></i>
                <span class="text-xl font-bold tracking-tight">SIAKAD PRO</span>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-2">
                <a href="dashboard1.html" class="flex items-center py-3 px-4 text-blue-300 hover:bg-blue-800 hover:text-white rounded-xl transition">
                    <i class="fas fa-th-large mr-3"></i> Dashboard Utama
                </a>
                <a href="profile.html" class="flex items-center py-3 px-4 bg-blue-800 text-white rounded-xl transition">
                    <i class="fas fa-user mr-3"></i> Data Profil
                </a>
                <a href="krs.html" class="flex items-center py-3 px-4 text-blue-300 hover:bg-blue-800 hover:text-white rounded-xl transition">
                    <i class="fas fa-file-alt mr-3"></i> Kartu Rencana Studi
                </a>
                <a href="transkrip.html" class="flex items-center py-3 px-4 text-blue-300 hover:bg-blue-800 hover:text-white rounded-xl transition">
                    <i class="fas fa-chart-bar mr-3"></i> Hasil Studi (IPK)
                </a>
                <a href="biaya.html" class="flex items-center py-3 px-4 text-blue-300 hover:bg-blue-800 hover:text-white rounded-xl transition">
                    <i class="fas fa-money-check-alt mr-3"></i> Biaya Kuliah
                </a>
            </nav>

            <div class="p-6 border-t border-blue-800">
                <a href="index.html" class="flex items-center text-red-400 hover:text-red-300">
                    <i class="fas fa-sign-out-alt mr-3"></i> Logout
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col">
            <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800">Pengaturan Profil 👋</h2>
                <div class="flex items-center space-x-6">
                    <button class="relative text-gray-500 hover:text-blue-800">
                        <i class="fas fa-bell text-xl"></i>
                        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center">3</span>
                    </button>
                    <div class="flex items-center space-x-3 border-l pl-6">
                        <div class="text-right hidden sm:block">
                            <p class="text-sm font-bold text-gray-800 leading-none">Budi Santoso</p>
                            <p class="text-xs text-gray-500 mt-1">NIM: 2024001092</p>
                        </div>
                        <img src="https://i.pravatar.cc/150?u=budi" class="w-10 h-10 rounded-full border border-blue-100">
                    </div>
                </div>
            </header>

            <main class="p-8 overflow-y-auto">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex items-center space-x-3 mb-6 border-b pb-4">
                            <i class="fas fa-id-card text-blue-800 text-xl"></i>
                            <h4 class="font-bold text-gray-800 text-lg">Informasi Pribadi</h4>
                        </div>
                        <form class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-2">Nama Lengkap</label>
                                    <input type="text" value="Budi Santoso" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-800 outline-none transition">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-600 mb-2">NIM</label>
                                    <input type="text" value="2024001092" disabled class="w-full p-3 bg-gray-100 rounded-xl border border-gray-200 text-gray-500 cursor-not-allowed font-medium">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-600 mb-2">Email Institusi</label>
                                <input type="email" value="budi.santoso@mhs.unesa.ac.id" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-800 outline-none transition">
                            </div>
                            <div class="flex justify-end">
                                <button type="button" id="btnSimpan" class="bg-blue-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-900 shadow-lg shadow-blue-200 transition">
                                    Simpan Perubahan
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 h-fit">
                        <div class="flex items-center space-x-3 mb-6 border-b pb-4">
                            <i class="fas fa-shield-alt text-blue-800 text-xl"></i>
                            <h4 class="font-bold text-gray-800 text-lg">Keamanan Akun</h4>
                        </div>
                        <form class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-600 mb-2">Password Lama</label>
                                <input type="password" placeholder="••••••••" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-800 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-600 mb-2">Password Baru</label>
                                <input type="password" placeholder="Minimal 8 karakter" class="w-full p-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-800 outline-none transition">
                            </div>
                            <button type="button" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold hover:bg-black shadow-lg shadow-gray-200 transition">
                                Update Password
                            </button>
                        </form>
                    </div>
                </div>
            </main>

            <footer class="mt-auto py-4 px-8 border-t bg-white text-gray-500 text-[10px] flex justify-between">
                <span>Versi Sistem 2.0.4-Stable</span>
                <span>&copy; 2026 Tim IT SMAN Unggul</span>
            </footer>
        </div>
    </div>

    <script>
        const btnSimpan = document.getElementById('btnSimpan');
        btnSimpan.addEventListener('click', function() {
            alert('Data berhasil disimpan! (Ini masih simulasi frontend)');
        });
    </script>
</body>
</html>
